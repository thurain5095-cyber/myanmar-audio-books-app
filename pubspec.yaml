name: myanmar_audio_books
description: A secure Myanmar Audio Books app using Bunny.net.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.11
  path_provider: ^2.1.2
  encrypt: ^5.0.3
  google_mobile_ads: ^5.1.0
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  dio: ^5.4.1
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  audio_video_progress_bar: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
